<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>KenEyeCue Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0f1115;--panel:#171a21;--panel2:#20242d;--line:#333846;--text:#f5efe6;--muted:#a9a197;--gold:#d6b46d;--gold2:#f1d997;--ok:#78d6a3;--warn:#f2c36b;--hot:#f07f7f;--blue:#8bb9ff;
    }
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at top right,#24202a 0,#0f1115 38%,#0b0c0f 100%);color:var(--text);font-family:Inter,'Noto Serif TC',sans-serif;line-height:1.5} 
    header{position:sticky;top:0;z-index:5;background:rgba(15,17,21,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
    .wrap{max-width:1240px;margin:0 auto;padding:22px}.top{display:flex;gap:16px;align-items:center;justify-content:space-between}.brand h1{margin:0;font-family:'Noto Serif TC',serif;font-size:28px;letter-spacing:.04em}.brand p{margin:5px 0 0;color:var(--muted);font-size:13px}.pill{border:1px solid rgba(214,180,109,.42);color:var(--gold2);padding:7px 10px;border-radius:999px;font-size:12px;background:rgba(214,180,109,.08)}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:18px}.card{background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.02));border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 18px 60px rgba(0,0,0,.18)}.kpi span{display:block;color:var(--muted);font-size:12px}.kpi strong{display:block;margin-top:6px;font-size:28px;color:var(--gold2)}.kpi small{color:var(--muted)}
    main{max-width:1240px;margin:0 auto;padding:0 22px 34px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin:18px 0}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tab,.btn{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:12px;padding:10px 12px;cursor:pointer;font-weight:600}.tab.active,.btn.primary{border-color:rgba(214,180,109,.65);background:linear-gradient(135deg,#d6b46d,#8d6b2e);color:#111}.btn.ghost{background:transparent}.btn.danger{border-color:rgba(240,127,127,.55);color:#ffc2c2}.filters{display:flex;gap:8px;flex-wrap:wrap}.filters input,.filters select,.form input,.form select,.form textarea{background:#101218;border:1px solid var(--line);color:var(--text);border-radius:12px;padding:10px;width:100%}.filters input{min-width:230px}.layout{display:grid;grid-template-columns:1fr 360px;gap:14px}.table{overflow:auto}.list{min-width:920px}.row{display:grid;grid-template-columns:1.2fr .9fr .7fr .8fr .7fr 1.1fr .7fr;gap:10px;align-items:center;padding:12px;border-bottom:1px solid rgba(255,255,255,.07)}.row.head{color:var(--gold2);font-size:12px;text-transform:uppercase;letter-spacing:.08em}.row:not(.head):hover{background:rgba(255,255,255,.035)}.name{font-weight:700}.sub{font-size:12px;color:var(--muted);margin-top:2px}.tag{display:inline-flex;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:700}.stage{background:rgba(139,185,255,.14);color:#cde1ff}.paid{background:rgba(120,214,163,.13);color:#bff0d2}.unpaid{background:rgba(242,195,107,.12);color:#ffe0a0}.urgent{background:rgba(240,127,127,.16);color:#ffcaca}.normal{background:rgba(214,180,109,.12);color:#ffe7a6}.low{background:rgba(255,255,255,.08);color:#d7d0c8}.actions{display:flex;gap:6px;flex-wrap:wrap}.mini{font-size:12px;padding:7px 8px;border-radius:9px}
    .side h2{margin:0 0 10px;font-family:'Noto Serif TC',serif}.form{display:grid;gap:10px}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}.hint{color:var(--muted);font-size:12px}.notice{border:1px dashed rgba(214,180,109,.5);background:rgba(214,180,109,.06);border-radius:14px;padding:12px;color:#ead7ad;font-size:13px}.hidden{display:none!important}.empty{padding:42px;text-align:center;color:var(--muted)}
    @media(max-width:980px){.grid{grid-template-columns:repeat(2,1fr)}.layout{grid-template-columns:1fr}.side{order:-1}.top{align-items:flex-start;flex-direction:column}}@media(max-width:560px){.grid{grid-template-columns:1fr}.wrap,main{padding-left:14px;padding-right:14px}.two{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header>
    <div class="wrap top">
      <div class="brand">
        <h1>KenEyeCue 後台管理儀表板</h1>
        <p>訊號檢測名單、預約、付款、下一步行動集中管理</p>
      </div>
      <div class="pill">Local MVP｜資料暫存於此裝置瀏覽器</div>
    </div>
  </header>

  <section class="wrap grid">
    <div class="card kpi"><span>總名單</span><strong id="kpiLeads">0</strong><small>含訊號檢測與諮詢</small></div>
    <div class="card kpi"><span>需跟進</span><strong id="kpiFollow">0</strong><small>尚未完成下一步</small></div>
    <div class="card kpi"><span>已付款預約</span><strong id="kpiPaid">0</strong><small>付款狀態為已付款</small></div>
    <div class="card kpi"><span>預估營收</span><strong id="kpiRevenue">NT$0</strong><small>已付款金額合計</small></div>
  </section>

  <main>
    <div class="toolbar">
      <div class="tabs">
        <button class="tab active" data-tab="all">全部</button>
        <button class="tab" data-tab="lead">訊號檢測</button>
        <button class="tab" data-tab="booking">預約／付款</button>
        <button class="tab" data-tab="todo">需要跟進</button>
      </div>
      <div class="filters">
        <input id="search" placeholder="搜尋姓名、來源、備註、下一步…" />
        <select id="stageFilter"><option value="">全部階段</option></select>
        <button class="btn ghost" id="exportBtn">匯出 JSON</button>
        <label class="btn ghost" for="importFile">匯入 JSON</label><input id="importFile" class="hidden" type="file" accept="application/json" />
      </div>
    </div>

    <div class="layout">
      <section class="card table">
        <div class="row head list">
          <div>姓名 / 聯絡</div><div>來源</div><div>類型</div><div>階段</div><div>付款</div><div>下一步</div><div>操作</div>
        </div>
        <div id="rows" class="list"></div>
      </section>

      <aside class="card side">
        <h2 id="formTitle">新增名單</h2>
        <div class="notice">⚠️ 目前是前端 MVP，適合先手動整理、匯入／匯出資料。尚未串接 LINE、表單、付款系統或 Gmail。</div>
        <form class="form" id="leadForm">
          <input type="hidden" id="editId" />
          <div class="two"><input id="name" placeholder="姓名" required /><input id="contact" placeholder="IG / LINE / Email" /></div>
          <div class="two"><select id="type"><option value="lead">訊號檢測</option><option value="booking">預約／付款</option></select><input id="source" placeholder="來源：IG / Threads / LINE" /></div>
          <div class="two"><select id="stage"></select><select id="payment"><option>未付款</option><option>已付款</option><option>待確認</option><option>不適用</option></select></div>
          <div class="two"><input id="amount" type="number" min="0" placeholder="金額 NT$" /><select id="priority"><option>中</option><option>高</option><option>低</option></select></div>
          <textarea id="need" rows="2" placeholder="客戶需求 / 誤讀點 / 想被理解的樣子"></textarea>
          <textarea id="nextAction" rows="2" placeholder="下一步：回覆、收款、排時間、補資料、升級方案…"></textarea>
          <textarea id="note" rows="2" placeholder="備註"></textarea>
          <button class="btn primary" type="submit">儲存</button>
          <button class="btn ghost" type="button" id="resetBtn">清空表單</button>
          <button class="btn danger" type="button" id="clearBtn">清空全部資料</button>
          <p class="hint">建議每天收尾匯出 JSON 備份。正式版可再串接 Google Sheet / Airtable / Supabase。</p>
        </form>
      </aside>
    </div>
  </main>

  <script>
    const KEY='keneyecue_admin_v1';
    const STAGES=['S1 新名單','S2 已回覆','S3 已送診斷','S4 等待補資料','S5 待收款','S6 已付款','S7 已預約','S8 已完成'];
    let data=JSON.parse(localStorage.getItem(KEY)||'[]');
    const $=id=>document.getElementById(id);
    const money=n=>'NT$'+Number(n||0).toLocaleString('zh-TW');
    const save=()=>localStorage.setItem(KEY,JSON.stringify(data));
    function initOptions(){['stage','stageFilter'].forEach(id=>{const el=$(id); STAGES.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;el.appendChild(o);});});}
    function score(item){return item.priority==='高'?2:item.nextAction?1:0}
    function tag(text,cls){return `<span class="tag ${cls}">${text}</span>`}
    function render(){
      const tab=document.querySelector('.tab.active').dataset.tab, q=$('search').value.toLowerCase(), sf=$('stageFilter').value;
      let list=data.filter(x=>!sf||x.stage===sf).filter(x=>[x.name,x.contact,x.source,x.type,x.stage,x.payment,x.need,x.nextAction,x.note].join(' ').toLowerCase().includes(q));
      if(tab==='lead') list=list.filter(x=>x.type==='lead');
      if(tab==='booking') list=list.filter(x=>x.type==='booking'||x.payment==='已付款');
      if(tab==='todo') list=list.filter(x=>x.nextAction && !['S8 已完成'].includes(x.stage));
      list.sort((a,b)=>score(b)-score(a)||new Date(b.updatedAt)-new Date(a.updatedAt));
      $('kpiLeads').textContent=data.length;
      $('kpiFollow').textContent=data.filter(x=>x.nextAction&&x.stage!=='S8 已完成').length;
      $('kpiPaid').textContent=data.filter(x=>x.payment==='已付款').length;
      $('kpiRevenue').textContent=money(data.filter(x=>x.payment==='已付款').reduce((s,x)=>s+Number(x.amount||0),0));
      $('rows').innerHTML=list.length?list.map(x=>`
        <div class="row">
          <div><div class="name">${esc(x.name||'未命名')}</div><div class="sub">${esc(x.contact||'未填聯絡方式')}</div></div>
          <div>${esc(x.source||'未標記')}</div>
          <div>${x.type==='booking'?tag('預約','normal'):tag('檢測','low')}</div>
          <div>${tag(esc(x.stage),'stage')}</div>
          <div>${x.payment==='已付款'?tag('已付款','paid'):x.payment==='未付款'?tag('未付款','unpaid'):tag(esc(x.payment),'low')}<div class="sub">${money(x.amount)}</div></div>
          <div><div>${x.priority==='高'?tag('高','urgent'):x.priority==='低'?tag('低','low'):tag('中','normal')}</div><div class="sub">${esc(x.nextAction||'無')}</div></div>
          <div class="actions"><button class="btn mini ghost" onclick="editItem('${x.id}')">編輯</button><button class="btn mini danger" onclick="delItem('${x.id}')">刪除</button></div>
        </div>`).join(''):'<div class="empty">目前沒有符合條件的資料。</div>';
    }
    function esc(s){return String(s||'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));}
    function readForm(){return {id:$('editId').value||crypto.randomUUID(),name:$('name').value.trim(),contact:$('contact').value.trim(),type:$('type').value,source:$('source').value.trim(),stage:$('stage').value,payment:$('payment').value,amount:Number($('amount').value||0),priority:$('priority').value,need:$('need').value.trim(),nextAction:$('nextAction').value.trim(),note:$('note').value.trim(),updatedAt:new Date().toISOString()};}
    function fillForm(x={}){['editId','name','contact','source','amount','need','nextAction','note'].forEach(id=>$(id).value=x[id]||'');$('type').value=x.type||'lead';$('stage').value=x.stage||STAGES[0];$('payment').value=x.payment||'未付款';$('priority').value=x.priority||'中';$('formTitle').textContent=x.id?'編輯名單':'新增名單';}
    window.editItem=id=>{const x=data.find(i=>i.id===id); if(x) fillForm(x); window.scrollTo({top:0,behavior:'smooth'});};
    window.delItem=id=>{if(confirm('確定刪除這筆資料？')){data=data.filter(x=>x.id!==id);save();render();}};
    $('leadForm').addEventListener('submit',e=>{e.preventDefault();const item=readForm();const idx=data.findIndex(x=>x.id===item.id);idx>=0?data[idx]=item:data.push(item);save();fillForm();render();});
    $('resetBtn').onclick=()=>fillForm();
    $('clearBtn').onclick=()=>{if(confirm('確定清空全部資料？此動作只會清除此瀏覽器 localStorage。')){data=[];save();render();}};
    document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');render();});
    $('search').oninput=render;$('stageFilter').onchange=render;
    $('exportBtn').onclick=()=>{const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='keneyecue-admin-backup.json';a.click();};
    $('importFile').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const incoming=JSON.parse(r.result);if(!Array.isArray(incoming))throw Error('bad');data=incoming;save();render();alert('匯入完成');}catch{alert('JSON 格式不正確');}};r.readAsText(f);};
    initOptions(); fillForm(); render();
  </script>
</body>
</html>
